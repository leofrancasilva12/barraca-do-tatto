<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comanda — Buteco do Tattoo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --blue: #000;
      --blue2: #222;
      --bluelight: rgba(0, 0, 0, .06);
      --yellow: #f5c518;
      --dark: #1a2a3a;
      --bg: #f4f7fb;
      --card: #fff;
      --text: #1a2a3a;
      --sub: #6b7f94;
      --green: #27ae60;
      --red: #e74c3c;
      --orange: #e67e22;
      --purple: #8e44ad;
    }

    [data-theme="dark"] {
      --bg: #000;
      --card: #111;
      --text: #fff;
      --sub: #aaa;
      --dark: #fff;
      --blue: #fff;
      --blue2: #e0e0e0;
      --bluelight: rgba(255, 255, 255, .06);
      --green: #00b894;
      --red: #ff6b6b;
      --orange: #feca57;
      --yellow: #ffeaa7;
      --purple: #a29bfe;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: #eef2f7
    }

    ::-webkit-scrollbar-thumb {
      background: var(--blue);
      border-radius: 3px
    }

    /* ── UNIFIED HEADER (same as dashboard) ── */
    .top-header {
      background: #fff;
      padding: 14px 20px;
      color: #1a2a3a;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
      border-bottom: 1.5px solid #e0e5ee;
    }

    .top-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(0, 119, 182, .4);
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -.5px
    }

    .brand .sub {
      font-size: 10px;
      opacity: .6;
      font-weight: 500;
      margin-top: 1px
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center
    }

    .nav-link {
      background: #f0f3f8;
      border: 1px solid #e0e5ee;
      color: #1a2a3a;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
      min-height: 44px;
      box-sizing: border-box;
    }

    .nav-link:hover {
      background: #e0e5ee;
      color: #0d1b2a
    }

    .nav-link.active {
      background: #000;
      color: #fff;
      border-color: #000
    }

    .nav-link svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    @media(max-width:600px) {
      .nav-links {
        gap: 8px;
        justify-content: center
      }

      .nav-link {
        flex: 1 1 auto;
        justify-content: center;
        text-align: center;
        padding: 10px 12px;
        font-size: 11px
      }
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #e8edf3;
      position: sticky;
      top: 68px;
      z-index: 40;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      white-space: nowrap
    }

    .toolbar select {
      background: var(--bluelight);
      border: 1.5px solid #d0d0d0;
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      max-width: 180px;
    }

    .toolbar select:focus {
      outline: none;
      border-color: var(--blue)
    }

    .btn-action {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-action:hover {
      background: #222
    }

    .btn-action svg {
      width: 13px;
      height: 13px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round
    }

    .toolbar-spacer {
      flex: 1
    }

    /* ── STATUS CHIPS ── */
    .status-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .status-bar::-webkit-scrollbar {
      display: none
    }

    .chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      border: 1.5px solid transparent;
    }

    .chip.all {
      background: #f0f3f8;
      color: var(--sub);
      border-color: #e0e5ee
    }

    .chip.aberta {
      background: #e8faf0;
      color: var(--green);
      border-color: #a8e6c3
    }

    .chip.fechada {
      background: #fff3e0;
      color: var(--orange);
      border-color: #ffd699
    }

    .chip.paga {
      background: #f5f5f5;
      color: #888;
      border-color: #ddd
    }

    .chip.active {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
    }

    /* ── GRID ── */
    .grid {
      padding: 16px 20px 100px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    @media(max-width:420px) {
      .grid {
        grid-template-columns: 1fr;
        padding: 12px 12px 100px
      }
    }

    /* ── COMANDA CARD ── */
    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .05);
      border: 1px solid #e8edf3;
      transition: transform .2s, box-shadow .2s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08)
    }

    .card.fechada {
      border-color: #ffd699
    }

    .card.paga {
      border-color: #ddd;
      opacity: .75
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #f0f3f8;
      border-bottom: 1px solid #e8edf3;
    }

    .card.fechada .card-head {
      background: linear-gradient(135deg, #fff8ed, #fff3e0)
    }

    .card.paga .card-head {
      background: linear-gradient(135deg, #f8f8f8, #f2f2f2)
    }

    .card-mesa {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .mesa-num {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
    }

    .card.fechada .mesa-num {
      background: linear-gradient(135deg, var(--orange), #f39c12)
    }

    .card.paga .mesa-num {
      background: #ccc
    }

    .mesa-info h3 {
      font-size: 13px;
      font-weight: 800;
      color: var(--dark)
    }

    .mesa-info span {
      font-size: 10px;
      color: var(--sub)
    }

    .status-tag {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .st-aberta {
      background: #e8faf0;
      color: var(--green)
    }

    .st-fechada {
      background: #fff3e0;
      color: var(--orange)
    }

    .st-paga {
      background: #f0f0f0;
      color: #999
    }

    .card-body {
      padding: 12px 16px
    }

    .card-client {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--sub);
      flex-wrap: wrap;
      line-height: 1.8
    }

    .card-client strong {
      color: var(--dark)
    }

    .card-items {
      margin-bottom: 10px;
      max-height: 180px;
      overflow-y: auto
    }

    .c-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px dashed #f0f3f8;
      font-size: 12px;
    }

    .c-item:last-child {
      border-bottom: none
    }

    .c-item-name {
      flex: 1;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .c-item-qty {
      background: var(--bluelight);
      color: var(--blue);
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700
    }

    .c-item-price {
      font-weight: 800;
      color: var(--blue);
      white-space: nowrap;
      min-width: 65px;
      text-align: right;
      font-size: 11px
    }

    .item-btns {
      display: flex;
      gap: 2px;
      margin-left: 4px
    }

    .ibtn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      padding: 0;
      flex-shrink: 0;
    }

    .ibtn svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .ibtn-minus {
      background: #fff3e0;
      color: var(--orange)
    }

    .ibtn-minus:hover {
      background: var(--orange);
      color: #fff
    }

    .ibtn-plus {
      background: var(--bluelight);
      color: var(--blue)
    }

    .ibtn-plus:hover {
      background: var(--blue);
      color: #fff
    }

    .ibtn-del {
      background: #ffeaea;
      color: var(--red)
    }

    .ibtn-del:hover {
      background: var(--red);
      color: #fff
    }

    .card-obs {
      background: #fffbe6;
      border: 1px solid #ffeaa7;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 11px;
      color: #7d6608;
      margin-bottom: 10px;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f8fafc;
      border-top: 1px solid #e8edf3;
      flex-wrap: wrap;
      gap: 8px;
    }

    .card.fechada .card-foot {
      background: #fffcf5
    }

    .card.paga .card-foot {
      background: #fafafa
    }

    .card-total {
      font-size: 17px;
      font-weight: 900;
      color: var(--blue)
    }

    .card.paga .card-total {
      color: #999
    }

    .card-actions {
      display: flex;
      gap: 5px;
      flex-wrap: wrap
    }

    .abtn {
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .abtn svg {
      width: 11px;
      height: 11px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .abtn-add {
      background: var(--bluelight);
      color: var(--blue)
    }

    .abtn-add:hover {
      background: var(--blue);
      color: #fff
    }

    .abtn-close {
      background: #fff3e0;
      color: var(--orange)
    }

    .abtn-close:hover {
      background: var(--orange);
      color: #fff
    }

    .abtn-pay {
      background: #e8faf0;
      color: var(--green)
    }

    .abtn-pay:hover {
      background: var(--green);
      color: #fff
    }

    .abtn-reopen {
      background: #fff3e0;
      color: var(--orange)
    }

    .abtn-reopen:hover {
      background: var(--orange);
      color: #fff
    }

    .abtn-print {
      background: #f0f3f8;
      color: #666
    }

    .abtn-print:hover {
      background: #666;
      color: #fff
    }

    .abtn-del {
      background: #ffeaea;
      color: var(--red)
    }

    .abtn-del:hover {
      background: var(--red);
      color: #fff
    }

    /* ── MODALS ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .overlay.open {
      display: flex
    }

    .mbox {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 460px;
      max-height: 88vh;
      overflow-y: auto;
      animation: mSlide .22s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
    }

    @keyframes mSlide {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .mhead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #e8edf3;
      background: #f4f7fb;
    }

    .mhead h2 {
      font-size: 15px;
      font-weight: 900;
      color: var(--dark)
    }

    .mx {
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      padding: 4px
    }

    .mx svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round
    }

    .mbody {
      padding: 16px 20px
    }

    .msearch {
      width: 100%;
      background: #f0f3f8;
      border: 1.5px solid #e0e5ee;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      margin-bottom: 12px;
    }

    .msearch:focus {
      outline: none;
      border-color: var(--blue)
    }

    /* Menu items in modal */
    .cat-sec {
      margin-bottom: 14px
    }

    .cat-lbl {
      font-size: 10px;
      font-weight: 800;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px
    }

    .mi {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s
    }

    .mi:hover {
      background: #f0f3f8
    }

    .mi-img {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0
    }

    .mi-info {
      flex: 1;
      min-width: 0
    }

    .mi-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .mi-price {
      font-size: 11px;
      font-weight: 800;
      color: var(--blue)
    }

    .mi-add {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .mi-add:hover {
      background: #005f96
    }

    .mi-add svg {
      width: 12px;
      height: 12px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round
    }

    /* Form */
    .fg {
      margin-bottom: 12px
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 4px
    }

    .fg input,
    .fg textarea {
      width: 100%;
      background: #f0f3f8;
      border: 1.5px solid #e0e5ee;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
    }

    .fg input:focus,
    .fg textarea:focus {
      outline: none;
      border-color: var(--blue)
    }

    .fg textarea {
      resize: none;
      height: 55px
    }

    .btn-sub {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .2s;
      font-family: inherit;
    }

    .btn-sub:hover {
      background: #005f96
    }

    /* PIX Modal */
    .pix-center {
      text-align: center;
      padding: 20px
    }

    .pix-center h3 {
      font-size: 16px;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 4px
    }

    .pix-total {
      font-size: 26px;
      font-weight: 900;
      color: var(--blue);
      margin: 8px 0 14px
    }

    .pix-qr {
      margin: 0 auto 14px;
      border-radius: 12px;
      overflow: hidden;
      display: inline-block;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .1)
    }

    .pix-qr img {
      display: block;
      width: 180px;
      height: 180px
    }

    .pix-key-box {
      background: #f0f3f8;
      border: 1.5px solid #e0e5ee;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .pix-key-val {
      font-family: monospace;
      font-size: 12px;
      color: var(--blue);
      word-break: break-all
    }

    .btn-copy {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .pix-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px
    }

    .btn-confirm {
      background: var(--green);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit
    }

    .btn-confirm:hover {
      background: #1e8449
    }

    .btn-cancel {
      background: #f0f3f8;
      color: var(--sub);
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit
    }

    /* ── CALCULATOR ── */
    .calc-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      border: none;
      background: #000;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .calc-fab:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4)
    }

    [data-theme="dark"] .calc-fab {
      background: #fff;
      color: #000;
      box-shadow: 0 6px 20px rgba(255, 255, 255, .15)
    }

    [data-theme="dark"] .calc-fab:hover {
      background: #f0f0f0;
      box-shadow: 0 8px 24px rgba(255, 255, 255, .22)
    }

    .calc-body {
      padding: 0
    }

    .calc-display {
      background: var(--dark);
      color: #fff;

      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      word-break: break-all;
      border-radius: 16px 16px 0 0;
    }

    .calc-keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #e0e5ee

    .calc-key {
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background .1s;
      background: #fff;
      color: var(--dark);

      background: #f0f3f8

      background: #e0e5ee

    .calc-key.op {
      background: #f0f0f0;
      color: var(--blue)
    }

    .calc-key.eq {
      background: var(--blue);
      color: #fff
    }

    .calc-key.eq:hover {
      background: #222

    .calc-key.clear {
      background: #ffeaea;
      color: var(--red)
    }

    /* ── FLOAT TOTAL ── */
    .float-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--dark), #0d1b2a);
      color: #fff;
      padding: 10px 24px;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .3);
      display: none;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      font-weight: 700;
      z-index: 30;
      max-width: calc(100vw - 100px);
    }

      background: rgba(255, 255, 255, .15);
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 10px
    }

    .float-bar .fb-val {
      font-size: 17px;
      font-weight: 900
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      text-align: center;

  <script>
    // ── THEME SYSTEM ──
    function toggleTheme() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      if (isDark) { delete document.documentElement.dataset.theme; localStorage.setItem('btTheme', 'light') }
      else { document.documentElement.dataset.theme = 'dark'; localStorage.setItem('btTheme', 'dark') }
      updateThemeBtn();
    }
    function updateThemeBtn() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Claro' : 'Escuro';
    }
    (function () { if (localStorage.getItem('btTheme') === 'dark') { document.documentElement.dataset.theme = 'dark'; updateThemeBtn() } })();

    const PIX_KEY = 'leofrancasilva13@gmail.com'
    const PIX_NAME = 'Leonardo Franca Silva'
    const PIX_CITY = 'Salvador'

    /* ── Gerador de Payload PIX EMV/BR Code ── */
    function pixPayload(valor) {
      const f = (id, val) => id + String(val.length).padStart(2, '0') + val
      const merchant = f('00', 'br.gov.bcb.pix') + f('01', PIX_KEY)
      const txid = 'BT' + Date.now().toString(36).toUpperCase()
      const addData = f('05', txid.slice(0, 25))
      let payload = f('00', '01')
        + f('01', '12')
        + f('26', merchant)
        + f('52', '0000')
        + f('53', '986')
        + (valor > 0 ? f('54', valor.toFixed(2)) : '')
        + f('58', 'BR')
        + f('59', PIX_NAME.slice(0, 25))
        + f('60', PIX_CITY.slice(0, 15))
        + f('62', addData)
      payload += '6304'
      // CRC16-CCITT
      let crc = 0xFFFF
      for (let i = 0; i < payload.length; i++) {
        crc ^= payload.charCodeAt(i) << 8
        for (let j = 0; j < 8; j++) crc = crc & 0x8000 ? (crc << 1) ^ 0x1021 : crc << 1
        crc &= 0xFFFF
      }
      return payload + crc.toString(16).toUpperCase().padStart(4, '0')
    }

        }).join('')

        return `<div class="card ${c.status}">
      <div class="card-head">
        <div class="card-mesa"><div class="mesa-num">${c.mesa}</div><div class="mesa-info"><h3>Sombreiro ${c.mesa}</h3><span>${c.abertura} · ${qi} ${qi === 1 ? 'item' : 'itens'}</span></div></div>
        <span class="status-tag st-${c.status}">${c.status === 'aberta' ? '🟢 Aberta' : c.status === 'fechada' ? '🟠 Fechada' : '✅ Paga' + (c.formaPagamento ? ' (' + ({ pix: 'PIX', debito: 'Débito', credito: 'Crédito' }[c.formaPagamento] || c.formaPagamento) + ')' : '')}</span>
      </div>
      <div class="card-body">
        ${c.atendente || c.cliente ? `<div class="card-client">${c.atendente ? '🏷️ <strong>' + c.atendente + '</strong>' : ''}${c.cliente ? ' · 👤 ' + c.cliente : ''}</div>` : ''}
        <div class="card-items">${itemsH}${!c.items.length ? '<div style="text-align:center;padding:10px;color:var(--sub);font-size:11px">Sem itens</div>' : ''}</div>
        ${c.obs ? `<div class="card-obs"><strong>📝</strong> ${c.obs}</div>` : ''}
      </div>
      <div class="card-foot"><div class="card-total">${ts}</div><div class="card-actions">${acts}</div></div>
    </div>`
      }).join('')
    }

    /* ── ACTIONS ── */
    function criarComanda() {
      const atendente = document.getElementById('inp-atendente').value.trim()
      const mesa = document.getElementById('inp-mesa').value.trim()
      if (!atendente) { document.getElementById('inp-atendente').style.borderColor = 'var(--red)'; return }
      if (!mesa) { document.getElementById('inp-mesa').style.borderColor = 'var(--red)'; return }
      const c = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), mesa, cliente: document.getElementById('inp-client').value.trim(), atendente, pessoas: null, items: [], obs: '', status: 'aberta', abertura: now(), fechamento: null, pagamento: null }
      const all = loadComandas(); all.push(c); saveComandas(all)
      closeNovaMesa();['inp-mesa', 'inp-client', 'inp-atendente'].forEach(id => document.getElementById(id).value = '')
      renderComandas()
    }

    function addItemToComanda(mid) {
      const item = menu.find(i => i.id === mid); if (!item || !addingTo) return
      const all = loadComandas(), c = all.find(x => x.id === addingTo); if (!c) return
      const ex = c.items.find(i => i.id === mid); if (ex) ex.qty++; else c.items.push({ id: item.id, name: item.name, price: item.price, qty: 1 })
      saveComandas(all); renderComandas()
    }
    function chgQty(cid, iid, d) { const all = loadComandas(), c = all.find(x => x.id === cid); if (!c) return; const it = c.items.find(i => i.id === iid); if (!it) return; it.qty += d; if (it.qty <= 0) c.items = c.items.filter(i => i.id !== iid); saveComandas(all); renderComandas() }
    function rmItem(cid, iid) { const all = loadComandas(), c = all.find(x => x.id === cid); if (!c) return; c.items = c.items.filter(i => i.id !== iid); saveComandas(all); renderComandas() }

    function fecharComanda(id) {
      const all = loadComandas(), c = all.find(x => x.id === id); if (!c) return
      const total = c.items.filter(i => i.price != null).reduce((s, i) => s + i.price * i.qty, 0)
      pixComandaId = id
      document.getElementById('pay-mesa-title').textContent = `Sombreiro ${c.mesa}${c.cliente ? ' · ' + c.cliente : ''}`
      document.getElementById('pay-total-val').textContent = fmtP(total)
      document.getElementById('pay-methods').style.display = 'flex'
      document.getElementById('pix-detail').style.display = 'none'
      document.getElementById('card-detail').style.display = 'none'
      // PIX setup com payload EMV real
      const pixCode = pixPayload(total)
      document.getElementById('pix-qr-wrap').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(pixCode)}" alt="QR PIX" width="180" height="180"/>`
      document.getElementById('pix-qr-wrap').dataset.pixCode = pixCode
      document.getElementById('btn-pay-confirm').onclick = () => { confirmPayment(id, 'pix') }
      document.getElementById('modal-pay').classList.add('open')
    }
    function selectPayMethod(method) {
      document.getElementById('pay-methods').style.display = 'none'
      if (method === 'pix') {
        document.getElementById('pix-detail').style.display = 'block'
      } else {
        document.getElementById('card-detail').style.display = 'block'
        document.getElementById('card-method-label').textContent = method === 'debito' ? 'Pagamento no Débito' : 'Pagamento no Crédito'
        document.getElementById('btn-card-confirm').onclick = () => { confirmPayment(pixComandaId, method) }
      }
    }
    function backToMethods() {
      document.getElementById('pix-detail').style.display = 'none'
      document.getElementById('card-detail').style.display = 'none'
      document.getElementById('pay-methods').style.display = 'flex'
    }
    function confirmPayment(id, method) {
      const all = loadComandas(), c = all.find(x => x.id === id); if (!c) return
      c.status = 'paga'; c.pagamento = now(); c.formaPagamento = method
      saveComandas(all); closePayModal(); renderComandas()
    }
    function copyPixKey() {
      const code = document.getElementById('pix-qr-wrap').dataset.pixCode || PIX_KEY
      navigator.clipboard.writeText(code).then(() => { const b = document.querySelector('.btn-copy'); b.textContent = '✅ Copiado!'; setTimeout(() => b.textContent = '📋 Copiar Copia e Cola', 2000) })
    }
    function closePayModal() { document.getElementById('modal-pay').classList.remove('open'); pixComandaId = null }
    function pagarComanda(id) { fecharComanda(id) }
    function reabrirComanda(id) { const all = loadComandas(), c = all.find(x => x.id === id); if (c) { c.status = 'aberta'; c.fechamento = null; saveComandas(all); renderComandas() } }
    function excluirComanda(id) { if (!confirm('Excluir permanentemente?')) return; let all = loadComandas(); all = all.filter(c => c.id !== id); saveComandas(all); renderComandas() }
    function imprimirComanda(id) {
      const all = loadComandas(), c = all.find(x => x.id === id); if (!c) return
      const total = c.items.filter(i => i.price != null).reduce((s, i) => s + i.price * i.qty, 0)
      const w = window.open('', '_blank', 'width=320,height=500')
      w.document.write(`<html><head><title>Mesa ${c.mesa}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;font-size:12px;padding:10px;width:280px}h2{text-align:center;margin-bottom:8px}hr{border:none;border-top:1px dashed #999;margin:6px 0}.row{display:flex;justify-content:space-between;padding:2px 0}.total{font-weight:bold;font-size:14px}</style></head><body><h2>🌴 Buteco do Tattoo</h2><p style="text-align:center;font-size:10px">Stella Mares — Salvador</p><hr><div class="row"><b>Mesa: ${c.mesa}</b><span>${c.abertura}</span></div>${c.cliente ? '<div>Cliente: ' + c.cliente + '</div>' : ''}${c.atendente ? '<div>Atendente: ' + c.atendente + '</div>' : ''}<hr>${c.items.map(i => `<div class="row"><span>${i.name} x${i.qty}</span><span>${i.price != null ? fmtP(i.price * i.qty) : 'Consultar'}</span></div>`).join('')}<hr><div class="row total"><span>TOTAL</span><span>${fmtP(total)}</span></div><hr><p style="text-align:center;font-size:9px;margin-top:6px">Obrigado! 🌴</p><script>setTimeout(()=>window.print(),300)<\/script></body></html>`)
    }

    /* ── MODALS ── */
    function openNovaMesa() { document.getElementById('modal-nova').classList.add('open'); document.getElementById('inp-atendente').focus() }
    function closeNovaMesa() { document.getElementById('modal-nova').classList.remove('open') }
    function openAddItem(cid) { addingTo = cid; const c = loadComandas().find(x => x.id === cid); document.getElementById('add-title').textContent = `➕ Mesa ${c?.mesa || ''}`; document.getElementById('add-search').value = ''; document.getElementById('modal-add').classList.add('open'); renderMenuList(); document.getElementById('add-search').focus() }
    function closeAddItem() { document.getElementById('modal-add').classList.remove('open'); addingTo = null }

    function renderMenuList() {
      const q = document.getElementById('add-search').value.toLowerCase().trim()
      const f = q ? menu.filter(i => i.name.toLowerCase().includes(q)) : menu
      const el = document.getElementById('menu-list')
      el.innerHTML = catOrder.map(cat => { const items = f.filter(i => i.cat === cat); if (!items.length) return ''; return `<div class="cat-sec"><div class="cat-lbl">${catNames[cat]}</div>${items.map(i => `<div class="mi"><img class="mi-img" src="${i.img}" alt="${i.name}" loading="lazy"/><div class="mi-info"><div class="mi-name">${i.name}</div><div class="mi-price">${fmtP(i.price)}</div></div><button class="mi-add" onclick="addItemToComanda(${i.id})"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>`).join('')}</div>` }).join('')
      if (!f.length) el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--sub)">🔍 Nada encontrado</div>'
    }

    /* ── CALCULATOR ── */
    let calcStr = '0'
    function toggleCalc() { document.getElementById('modal-calc').classList.toggle('open') }
    function calcInput(v) { if (calcStr === '0' && !isNaN(v)) calcStr = v; else calcStr += v; document.getElementById('calc-display').textContent = calcStr }
    function calcClear() { calcStr = '0'; document.getElementById('calc-display').textContent = '0' }
    function calcEqual() { try { calcStr = String(eval(calcStr)); document.getElementById('calc-display').textContent = calcStr } catch (e) { document.getElementById('calc-display').textContent = 'Erro'; calcStr = '0' } }

    /* ── KEYBOARD ── */
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeNovaMesa(); closeAddItem(); closePayModal(); document.getElementById('modal-calc').classList.remove('open') } })
    window.addEventListener('storage', () => renderComandas())
    renderComandas()
  </script>
</body>

</html>
