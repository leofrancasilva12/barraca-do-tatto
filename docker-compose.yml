version: "3.8"

# Docker Compose — Cardápio Digital SaaS (Barraca do Tatto)
# Para usar: docker-compose up -d

services:
  # ─── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cardapio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cardapio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardapio_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cardapio_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardapio_user -d cardapio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (cache / filas / sessions) ─────────
  redis:
    image: redis:7-alpine
    container_name: cardapio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1

  # ─── n8n (automações WhatsApp + IA) ───────────
  n8n:
    image: n8nio/n8n:latest
    container_name: cardapio_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-cardapio_dev}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-cardapio_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-cardapio_pass}
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # ─── pgAdmin (gerência do banco) ──────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cardapio_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cardapio.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  n8n_data:

# ─── .env de exemplo (criar .env na raiz) ─────
# POSTGRES_USER=cardapio_user
# POSTGRES_PASSWORD=cardapio_pass
# POSTGRES_DB=cardapio_dev
# DATABASE_URL="postgresql://cardapio_user:cardapio_pass@localhost:5432/cardapio_dev"
# N8N_USER=admin
# N8N_PASSWORD=admin123
# PGADMIN_EMAIL=admin@cardapio.dev
# PGADMIN_PASSWORD=admin123
